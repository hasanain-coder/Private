<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الصيدلة السريرية - الجناح الخاص</title>
    
    <!-- Fonts & CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* === 1. THEMING & CSS VARIABLES === */
        :root {
            --bg: #f8fafc;
            --fg: #0f172a;
            --muted: #64748b;
            --accent: #0d9488;
            --accent-light: #ccfbf1;
            --card: #ffffff;
            --border: #e2e8f0;
            --surface: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
        }

        body.dark-mode {
            --bg: #0f172a;
            --fg: #f1f5f9;
            --muted: #94a3b8;
            --accent: #2dd4bf;
            --accent-light: #134e4a;
            --card: #1e293b;
            --border: #334155;
            --surface: #1e293b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        /* === 2. GLOBAL TYPOGRAPHY & TRANSITIONS === */
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Cairo', 'Noto Sans Arabic', sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            transition: background-color 0.3s ease, color 0.3s ease;
            margin: 0;
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
        }
        h1, h2, h3 { font-family: 'Cairo', 'Noto Sans Arabic', sans-serif; }
        .font-serif { font-family: 'Crimson Pro', serif; }
        
        /* Hide Scrollbars */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* === 3. UI COMPONENTS === */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .card-header {
            padding: 1rem 1.25rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease;
            padding: 0 1.25rem;
            background: var(--surface);
            border-top: 1px solid transparent;
        }
        .card-body.expanded {
            max-height: 2000px;
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
        }

        .filter-pill {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            background: var(--surface);
            color: var(--muted);
            border: 1px solid var(--border);
            transition: all 0.2s ease;
            cursor: pointer;
            white-space: nowrap;
        }
        .filter-pill.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 6px -1px rgba(13, 148, 136, 0.3);
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--fg);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }
        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        /* Autocomplete */
        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0; 
            background: var(--card); border: 1px solid var(--border); border-top: none;
            z-index: 50; max-height: 250px; overflow-y: auto; border-radius: 0 0 0.75rem 0.75rem;
            box-shadow: var(--shadow-lg);
        }
        .autocomplete-item { padding: 0.75rem 1rem; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.2s; }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: var(--accent-light); }

        /* Matrix Chart Specifics */
        .matrix-wrapper { overflow-x: auto; border-radius: 1rem; border: 1px solid var(--border); }
        .matrix-table { border-collapse: collapse; min-width: 100%; }
        .matrix-table th, .matrix-table td { border: 1px solid var(--border); padding: 8px 4px; text-align: center; font-size: 0.85rem; }
        .matrix-table th:first-child, .matrix-table td:first-child {
            position: sticky; right: 0; z-index: 10; background: var(--card);
            box-shadow: -4px 0 8px rgba(0,0,0,0.05); min-width: 120px; text-align: right; padding-right: 10px;
        }
        .vertical-text {
            writing-mode: vertical-lr; transform: rotate(180deg);
            height: 180px; white-space: nowrap; display: inline-block; font-weight: 600;
        }

        /* === 4. PRINT LAYOUT === */
        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; }
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                position: absolute; left: 0; top: 0; width: 100%; padding: 15mm;
                font-family: 'Cairo', 'Noto Sans Arabic', serif !important;
            }
            .print-table { width: 100%; border-collapse: collapse; }
            .print-table th, .print-table td { border: 1px solid #000 !important; padding: 6px 4px; font-size: 11px; text-align: center; }
            .print-header { text-align: center; font-weight: bold; font-size: 16px; margin-bottom: 15px; line-height: 1.8; }
            .print-signatures { display: flex; justify-content: space-between; margin-top: 50px; font-size: 14px; font-weight: bold; }
            .print-matrix { font-size: 8px; }
            .print-matrix th, .print-matrix td { padding: 2px !important; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="sticky top-0 z-40 backdrop-blur-lg bg-[var(--bg)]/80 border-b border-[var(--border)] px-4 py-3 flex justify-between items-center">
        <div>
            <h1 class="text-lg font-bold" style="color: var(--fg)">الجناح الخاص</h1>
            <p class="text-xs" style="color: var(--muted)">الصيدلة السريرية</p>
        </div>
        <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full flex items-center justify-center bg-[var(--surface)] border border-[var(--border)] transition-transform active:scale-90">
            <i id="theme-icon" class="fas fa-moon text-lg" style="color: var(--accent)"></i>
        </button>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        
        <!-- VIEW: ADMISSIONS -->
        <div id="view-admissions" class="view-section">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold">المرضى الراقدين</h2>
                <span id="patient-count" class="text-xs font-bold px-2 py-1 rounded-full" style="background: var(--accent-light); color: var(--accent)">0</span>
            </div>
            
            <!-- Filter Pills -->
            <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                <button class="filter-pill active" data-filter="all" onclick="setFilter('all', this)">الكل</button>
                <button class="filter-pill" data-filter="male" onclick="setFilter('male', this)">ذكور</button>
                <button class="filter-pill" data-filter="female" onclick="setFilter('female', this)">إناث</button>
                <button class="filter-pill" data-filter="room-1" onclick="setFilter('room-1', this)">غرفة 1</button>
                <button class="filter-pill" data-filter="room-2" onclick="setFilter('room-2', this)">غرفة 2</button>
                <button class="filter-pill" data-filter="room-3" onclick="setFilter('room-3', this)">غرفة 3</button>
            </div>

            <div id="patients-container"></div>
            <div id="no-patients" class="hidden text-center py-16" style="color: var(--muted)">
                <i class="fas fa-user-slash text-4xl mb-4 block opacity-50"></i>
                <p class="font-semibold">لا يوجد مرضى مسجلين</p>
            </div>
        </div>

        <!-- VIEW: DAILY LOG -->
        <div id="view-log" class="view-section hidden">
            <h2 class="text-xl font-bold mb-4">السجل اليومي</h2>
            <div class="card p-4 space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">المريض</label>
                    <select id="log-patient" class="input-field"></select>
                </div>
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-semibold mb-1">التاريخ</label>
                        <input type="date" id="log-date" class="input-field">
                    </div>
                    <div class="w-24">
                        <label class="block text-sm font-semibold mb-1">الكمية</label>
                        <input type="number" id="log-qty" inputmode="decimal" class="input-field text-center" value="1" min="1">
                    </div>
                </div>
                <div class="relative">
                    <label class="block text-sm font-semibold mb-1">اسم الدواء / المادة</label>
                    <input type="text" id="log-med-search" class="input-field" placeholder="ابحث هنا..." autocomplete="off">
                    <div id="med-dropdown" class="autocomplete-list hidden"></div>
                </div>
                <button onclick="addToTempLog()" class="w-full py-3 rounded-xl font-bold text-white transition-all active:scale-95" style="background: var(--accent)">
                    <i class="fas fa-plus ml-2"></i>أضافة للقائمة
                </button>
            </div>

            <div class="card mt-4">
                <div class="p-4 border-b" style="border-color: var(--border)">
                    <h3 class="font-bold">الأدوية المضافة اليوم</h3>
                </div>
                <div id="temp-log-container" class="p-4">
                    <p class="text-sm text-center" style="color: var(--muted)">القائمة فارغة</p>
                </div>
                <div class="p-4 border-t" style="border-color: var(--border)">
                    <button id="btn-save-log" onclick="saveLog()" disabled class="w-full py-3 rounded-xl font-bold text-white transition-all disabled:opacity-50 active:scale-95" style="background: var(--fg)">
                        <i class="fas fa-cloud-arrow-up ml-2"></i>حفظ السجل النهائي
                    </button>
                </div>
            </div>
        </div>

        <!-- VIEW: MATRIX CHART -->
        <div id="view-chart" class="view-section hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold">الخارطة اليومية</h2>
                <button onclick="printMatrix()" class="text-sm font-semibold px-3 py-1.5 rounded-lg border flex items-center gap-2 active:scale-95" style="border-color: var(--border); color: var(--muted)">
                    <i class="fas fa-print"></i> طباعة
                </button>
            </div>
            <div class="mb-4">
                <input type="date" id="chart-date" class="input-field" onchange="renderMatrix()">
            </div>
            <div id="matrix-container" class="matrix-wrapper bg-[var(--card)]"></div>
        </div>

        <!-- VIEW: DISCHARGE -->
        <div id="view-discharge" class="view-section hidden">
            <h2 class="text-xl font-bold mb-4">التصريف والفاتورة</h2>
            <div class="card p-4 space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">اختر المريض</label>
                    <select id="dis-patient" class="input-field"></select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">تاريخ التصريف</label>
                    <input type="date" id="dis-date" class="input-field">
                </div>
                <button onclick="generateDischargeInvoice()" class="w-full py-3 rounded-xl font-bold text-white transition-all active:scale-95" style="background: #ea580c">
                    <i class="fas fa-file-invoice-dollar ml-2"></i>توليد الفاتورة الرسمية
                </button>
            </div>
            <div id="discharge-preview" class="card mt-4 p-4 hidden">
                <button onclick="printInvoice()" class="w-full py-3 rounded-xl font-bold text-white transition-all active:scale-95 mb-4" style="background: var(--fg)">
                    <i class="fas fa-print ml-2"></i>طباعة A4 الرسمية
                </button>
                <div id="invoice-html" class="border rounded-lg p-4 text-sm" style="border-color: var(--border)"></div>
            </div>
        </div>
    </main>

    <!-- FAB -->
    <button onclick="openModal('modal-patient')" id="fab" class="fixed bottom-24 left-5 w-14 h-14 rounded-full shadow-lg flex items-center justify-center text-white text-2xl z-50 transition-all active:scale-90 hover:shadow-xl" style="background: var(--accent)">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 z-40 bg-[var(--card)]/90 backdrop-blur-lg border-t flex justify-around py-2" style="border-color: var(--border)">
        <button class="nav-btn flex flex-col items-center gap-1 px-3 py-1 rounded-xl transition-colors active" data-view="admissions" onclick="switchView('admissions')">
            <i class="fas fa-bed text-lg"></i>
            <span class="text-[10px] font-semibold">المرضى</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 px-3 py-1 rounded-xl transition-colors" data-view="log" onclick="switchView('log')">
            <i class="fas fa-prescription-bottle-medical text-lg"></i>
            <span class="text-[10px] font-semibold">السجل</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 px-3 py-1 rounded-xl transition-colors" data-view="chart" onclick="switchView('chart')">
            <i class="fas fa-table-cells-large text-lg"></i>
            <span class="text-[10px] font-semibold">الخارطة</span>
        </button>
        <button class="nav-btn flex flex-col items-center gap-1 px-3 py-1 rounded-xl transition-colors" data-view="discharge" onclick="switchView('discharge')">
            <i class="fas fa-file-invoice text-lg"></i>
            <span class="text-[10px] font-semibold">التصريف</span>
        </button>
    </nav>

    <!-- Modal: Add Patient -->
    <div id="modal-patient" class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4" style="background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);" onclick="if(event.target===this)closeModal('modal-patient')">
        <div class="bg-[var(--card)] w-full sm:max-w-md sm:rounded-2xl rounded-t-3xl p-6 shadow-2xl transform transition-all">
            <div class="w-12 h-1 bg-[var(--border)] rounded-full mx-auto mb-6 sm:hidden"></div>
            <h3 class="text-xl font-bold mb-6">دخول مريض جديد</h3>
            <div class="space-y-4">
                <input type="text" id="p-name" class="input-field" placeholder="اسم المريض">
                <div class="flex gap-3">
                    <input type="text" id="p-file" class="input-field flex-1" placeholder="رقم الطبّلة">
                    <input type="text" id="p-room" class="input-field w-24" placeholder="الغرفة">
                </div>
                <select id="p-ward" class="input-field">
                    <option value="male">ذكور</option>
                    <option value="female">إناث</option>
                </select>
                <input type="date" id="p-date" class="input-field">
                <button onclick="admitPatient()" class="w-full py-3 rounded-xl font-bold text-white transition-all active:scale-95" style="background: var(--accent)">حفظ المريض</button>
            </div>
        </div>
    </div>

    <!-- Print Overlay Area -->
    <div id="print-area" class="hidden"></div>

<script>
    // === STATE MANAGEMENT ===
    const state = {
        patients: [],
        dailyLogs: [],
        medicationsDB: [],
        tempLogItems: [],
        currentView: 'admissions',
        activeFilter: 'all',
        matrixDate: new Date().toISOString().split('T')[0]
    };

    // === DOM CACHE ===
    const DOM = {
        patientsContainer: () => document.getElementById('patients-container'),
        tempLogContainer: () => document.getElementById('temp-log-container'),
        matrixContainer: () => document.getElementById('matrix-container'),
        logPatient: () => document.getElementById('log-patient'),
        disPatient: () => document.getElementById('dis-patient'),
        medDropdown: () => document.getElementById('med-dropdown')
    };

    // === GOOGLE SHEETS & DATA INIT ===
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/YOUR_SHEET_ID/export?format=csv&gid=0";
    const mockMeds = [
        {name: "أموكسيسيلين 500mg كبسولة", price: 250, source: "كيماديا"},
        {name: "سيبروفلوكساسين 400mg حقنة", price: 1500, source: "شراء"},
        {name: "محلول ملحي 0.9% 500مل", price: 1000, source: "شراء"},
        {name: "محلول جلوكوز 5% 500مل", price: 1200, source: "كيماديا"},
        {name: "باراسيتامول 500mg قرص", price: 100, source: "كيماديا"},
        {name: "دكساميثازون 8mg حقنة", price: 800, source: "شراء"},
        {name: "أوميبرازول 40mg كبسولة", price: 350, source: "كيماديا"},
        {name: "اتروبين 0.1% حقنة", price: 500, source: "شراء"},
        {name: "قفازات طبية (علبة)", price: 2500, source: "شراء"},
        {name: "محاقن 10مل", price: 300, source: "كيماديا"},
        {name: "فيتامين سي 500mg", price: 150, source: "كيماديا"},
        {name: "ترامادول 100mg حقنة", price: 2000, source: "شراء"},
        {name: "هيبارين 5000 وحدة", price: 3500, source: "شراء"},
        {name: "لوراتادين 10mg قرص", price: 200, source: "كيماديا"},
        {name: "شاش طبي", price: 750, source: "شراء"}
    ];

    async function initApp() {
        loadState();
        await fetchMedications();
        setupEventListeners();
        renderApp();
    }

    async function fetchMedications() {
        try {
            const res = await fetch(SHEET_CSV_URL);
            if(!res.ok) throw new Error("Failed to fetch");
            const csv = await res.text();
            state.medicationsDB = parseCSV(csv);
            if(state.medicationsDB.length === 0) throw new Error("Parsed 0");
        } catch (err) {
            console.warn("Using Mock Medications:", err.message);
            state.medicationsDB = mockMeds;
        }
    }

    function parseCSV(csv) {
        const lines = csv.split('\n').filter(l => l.trim());
        const result = [];
        for(let i=1; i<lines.length; i++) {
            const cols = lines[i].match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            if(cols && cols.length >= 2) {
                result.push({
                    name: cols[0].replace(/^"|"$/g, '').trim(),
                    price: parseFloat(cols[1].replace(/,/g, '')) || 0,
                    source: (cols[2] || "كيماديا").replace(/^"|"$/g, '').trim()
                });
            }
        }
        return result;
    }

    // === LOCAL STORAGE PERSISTENCE ===
    function saveState() {
        localStorage.setItem('pharmacy_app_state', JSON.stringify({
            patients: state.patients,
            dailyLogs: state.dailyLogs
        }));
    }

    function loadState() {
        const saved = JSON.parse(localStorage.getItem('pharmacy_app_state') || '{}');
        state.patients = saved.patients || [];
        state.dailyLogs = saved.dailyLogs || [];
        document.getElementById('p-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('log-date').value = state.matrixDate;
        document.getElementById('chart-date').value = state.matrixDate;
        document.getElementById('dis-date').value = state.matrixDate;
        
        if(localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
        }
    }

    // === UI NAVIGATION & THEME ===
    function switchView(viewName) {
        state.currentView = viewName;
        document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
        document.getElementById(`view-${viewName}`).classList.remove('hidden');
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.remove('active');
            btn.style.color = 'var(--muted)';
            btn.style.background = 'transparent';
        });
        const activeBtn = document.querySelector(`.nav-btn[data-view="${viewName}"]`);
        activeBtn.classList.add('active');
        activeBtn.style.color = 'var(--accent)';
        activeBtn.style.background = 'var(--accent-light)';
        
        document.getElementById('fab').classList.toggle('hidden', viewName !== 'admissions');
        if(viewName === 'log' || viewName === 'discharge') populatePatientDropdowns();
        if(viewName === 'chart') renderMatrix();
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('darkMode', isDark);
        const icon = document.getElementById('theme-icon');
        icon.classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
    }

    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'fixed top-20 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl shadow-xl z-[60] text-white font-semibold text-sm';
        t.style.background = 'var(--fg)';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    // === SYNCHRONOUS RENDERING ===
    function renderApp() {
        renderPatients();
        renderTempLog();
    }

    function renderPatients() {
        const container = DOM.patientsContainer();
        const noMsg = document.getElementById('no-patients');
        document.getElementById('patient-count').innerText = state.patients.length;
        
        let filtered = [...state.patients];
        if(state.activeFilter === 'male') filtered = filtered.filter(p => p.ward === 'male');
        else if(state.activeFilter === 'female') filtered = filtered.filter(p => p.ward === 'female');
        else if(state.activeFilter.startsWith('room-')) {
            const room = state.activeFilter.split('-')[1];
            filtered = filtered.filter(p => p.roomNumber === room);
        }

        if(filtered.length === 0) {
            container.innerHTML = '';
            noMsg.classList.remove('hidden');
            return;
        }
        noMsg.classList.add('hidden');

        container.innerHTML = filtered.map(p => `
            <div class="card" data-id="${p.id}">
                <div class="card-header" onclick="toggleAccordion(this)">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center text-white text-sm font-bold" style="background: ${p.ward === 'male' ? '#3b82f6' : '#ec4899'}">
                            ${p.name.charAt(0)}
                        </div>
                        <div>
                            <h3 class="font-bold text-sm">${p.name}</h3>
                            <p class="text-xs" style="color: var(--muted)">طبّلة: ${p.fileNumber} | غرفة: ${p.roomNumber}</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-down text-xs transition-transform duration-300" style="color: var(--muted)"></i>
                </div>
                <div class="card-body">
                    <div class="flex justify-between text-sm mb-3 pb-3 border-b" style="border-color: var(--border)">
                        <span style="color: var(--muted)">تاريخ الدخول:</span>
                        <span class="font-semibold">${p.admissionDate}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="event.stopPropagation(); quickDischarge('${p.id}')" class="flex-1 py-2 text-xs font-bold rounded-lg border transition-colors" style="border-color: #ef4444; color: #ef4444">
                            <i class="fas fa-right-from-bracket ml-1"></i> تصريف
                        </button>
                        <button onclick="event.stopPropagation(); deletePatient('${p.id}')" class="py-2 px-4 text-xs font-bold rounded-lg border transition-colors" style="border-color: var(--border); color: var(--muted)">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleAccordion(header) {
        const body = header.nextElementSibling;
        const icon = header.querySelector('i');
        const isExpanded = body.classList.contains('expanded');
        
        // Close all others
        document.querySelectorAll('.card-body.expanded').forEach(b => {
            b.classList.remove('expanded');
            b.previousElementSibling.querySelector('i').style.transform = 'rotate(0deg)';
        });

        if (!isExpanded) {
            body.classList.add('expanded');
            icon.style.transform = 'rotate(180deg)';
        }
    }

    function setFilter(filter, el) {
        state.activeFilter = filter;
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        renderPatients();
    }

    function renderTempLog() {
        const container = DOM.tempLogContainer();
        const btn = document.getElementById('btn-save-log');
        
        if(state.tempLogItems.length === 0) {
            container.innerHTML = `<p class="text-sm text-center" style="color: var(--muted)">القائمة فارغة</p>`;
            btn.disabled = true;
            return;
        }
        
        btn.disabled = false;
        container.innerHTML = state.tempLogItems.map((item, i) => `
            <div class="flex items-center justify-between p-2 rounded-lg mb-2" style="background: var(--surface)">
                <span class="text-sm flex-1 font-medium">${item.name}</span>
                <span class="font-bold mx-3 text-sm" style="color: var(--accent)">x${item.quantity}</span>
                <button onclick="removeTempItem(${i})" class="text-red-500 hover:text-red-700"><i class="fas fa-xmark"></i></button>
            </div>
        `).join('');
    }

    // === BUSINESS LOGIC ===
    function admitPatient() {
        const name = document.getElementById('p-name').value.trim();
        const fileNumber = document.getElementById('p-file').value.trim();
        const roomNumber = document.getElementById('p-room').value.trim();
        const ward = document.getElementById('p-ward').value;
        const admissionDate = document.getElementById('p-date').value;

        if(!name || !fileNumber || !roomNumber || !admissionDate) return showToast("يرجى ملء جميع الحقول");

        state.patients.push({
            id: 'p_' + Date.now(),
            name, fileNumber, roomNumber, ward, admissionDate, status: 'active'
        });
        
        saveState();
        renderPatients();
        closeModal('modal-patient');
        document.getElementById('p-name').value = '';
        document.getElementById('p-file').value = '';
        document.getElementById('p-room').value = '';
        showToast("تم تسجيل المريض بنجاح");
    }

    function deletePatient(id) {
        if(confirm("هل أنت متأكد من حذف المريض؟")) {
            state.patients = state.patients.filter(p => p.id !== id);
            saveState();
            renderPatients();
        }
    }

    function quickDischarge(id) {
        switchView('discharge');
        setTimeout(() => {
            DOM.disPatient().value = id;
        }, 100);
    }

    // --- Daily Logging ---
    function populatePatientDropdowns() {
        const opts = state.patients.filter(p => p.status === 'active').map(p => 
            `<option value="${p.id}">${p.name} - ${p.ward === 'male' ? 'ذكور' : 'إناث'} (${p.roomNumber})</option>`
        ).join('');
        const def = `<option value="">-- اختر المريض --</option>`;
        DOM.logPatient().innerHTML = def + opts;
        DOM.disPatient().innerHTML = def + opts;
    }

    function addToTempLog() {
        const name = document.getElementById('log-med-search').value.trim();
        const qty = parseInt(document.getElementById('log-qty').value) || 0;
        
        if(!name || qty <= 0) return showToast("اختر الدواء وحدد الكمية");

        const existing = state.tempLogItems.find(i => i.name === name);
        if(existing) existing.quantity += qty;
        else state.tempLogItems.push({ name, quantity: qty });

        document.getElementById('log-med-search').value = '';
        document.getElementById('log-qty').value = 1;
        DOM.medDropdown().classList.add('hidden');
        renderTempLog();
    }

    function removeTempItem(i) {
        state.tempLogItems.splice(i, 1);
        renderTempLog();
    }

    function saveLog() {
        const patientId = DOM.logPatient().value;
        const date = document.getElementById('log-date').value;
        if(!patientId || !date || state.tempLogItems.length === 0) return showToast("بيانات ناقصة");

        state.dailyLogs.push({
            id: 'log_' + Date.now(),
            patientId, date,
            items: [...state.tempLogItems]
        });

        state.tempLogItems = [];
        saveState();
        renderTempLog();
        DOM.logPatient().value = '';
        showToast("تم حفظ السجل بنجاح");
    }

    // --- Matrix Chart ---
    function renderMatrix() {
        const container = DOM.matrixContainer();
        state.matrixDate = document.getElementById('chart-date').value;
        if(!state.matrixDate) return container.innerHTML = '<p class="p-10 text-center" style="color:var(--muted)">حدد تاريخاً</p>';

        const dayLogs = state.dailyLogs.filter(l => l.date === state.matrixDate);
        const activePatients = state.patients.filter(p => p.status === 'active');
        
        // Extract unique meds used today
        let medsMap = {};
        dayLogs.forEach(log => log.items.forEach(i => { medsMap[i.name] = true; }));
        const medColumns = Object.keys(medsMap);

        if(medColumns.length === 0) {
            return container.innerHTML = `<p class="p-10 text-center" style="color:var(--muted)"><i class="fas fa-chart-simple text-3xl block mb-2 opacity-30"></i>لا توجد سجلات لهذا اليوم</p>`;
        }

        // Prepare 30 fixed rows
        let rows = Array.from({length: 30}, (_, i) => ({ num: i + 1, patient: null, meds: {} }));
        activePatients.forEach((p, idx) => {
            if(idx < 30) {
                rows[idx].patient = p;
                // Populate quantities
                dayLogs.filter(l => l.patientId === p.id).forEach(log => {
                    log.items.forEach(item => {
                        if(!rows[idx].meds[item.name]) rows[idx].meds[item.name] = 0;
                        rows[idx].meds[item.name] += item.quantity;
                    });
                });
            }
        });

        let html = `<table class="matrix-table"><thead><tr><th>ت / المريض</th>`;
        medColumns.forEach(m => { html += `<th><div class="vertical-text">${m}</div></th>`; });
        html += `</tr></thead><tbody>`;

        let totals = new Array(medColumns.length).fill(0);

        rows.forEach(row => {
            const pName = row.patient ? `${row.patient.name} (${row.patient.ward === 'male' ? 'ذ' : 'ث'}${row.patient.roomNumber})` : '';
            html += `<tr><td>${row.num}. ${pName}</td>`;
            medColumns.forEach((med, idx) => {
                const qty = row.meds[med] || '';
                if(qty !== '') totals[idx] += qty;
                html += `<td class="font-bold" style="color: ${qty ? 'var(--accent)' : 'var(--muted)'}">${qty}</td>`;
            });
            html += `</tr>`;
        });

        // Totals Row
        html += `<tr style="background: var(--surface); font-weight:900;"><td>الإجمالي</td>`;
        totals.forEach(t => { html += `<td>${t > 0 ? t : ''}</td>`; });
        html += `</tr></tbody></table>`;

        container.innerHTML = html;
    }

    function printMatrix() {
        const printArea = document.getElementById('print-area');
        printArea.innerHTML = `<h2 style="text-align:center; margin-bottom:10px; font-family:'Cairo';">خارطة الأدوية اليومية - ${state.matrixDate}</h2>` + 
                              DOM.matrixContainer().innerHTML;
        printArea.querySelector('table')?.classList.add('print-matrix');
        printArea.classList.remove('hidden');
        window.print();
        setTimeout(() => printArea.classList.add('hidden'), 500);
    }

    // --- Discharge Invoice ---
    function generateDischargeInvoice() {
        const patientId = DOM.disPatient().value;
        const dischargeDate = document.getElementById('dis-date').value;
        const preview = document.getElementById('discharge-preview');
        const container = document.getElementById('invoice-html');

        if(!patientId || !dischargeDate) return showToast("اختر المريض وتاريخ التصريف");

        const patient = state.patients.find(p => p.id === patientId);
        if(!patient) return;

        const pLogs = state.dailyLogs.filter(l => 
            l.patientId === patientId && l.date >= patient.admissionDate && l.date <= dischargeDate
        );

        let aggMeds = {};
        pLogs.forEach(log => log.items.forEach(item => {
            if(!aggMeds[item.name]) aggMeds[item.name] = 0;
            aggMeds[item.name] += item.quantity;
        }));

        const medsArray = Object.entries(aggMeds);
        if(medsArray.length === 0) return showToast("لا توجد أدوية مسجلة لهذه الفترة");

        let html = `
            <div class="print-header">
                <p>مستشفى بغداد التعليمي - وحدة الصيدلة السريرية</p>
                <p>القطاع الخاص للمرضى الراقدين في الجناح الخاص</p>
                <p>قائمة الأدوية المصروفة من تاريخ: ${patient.admissionDate} لغاية: ${dischargeDate}</p>
            </div>
            <div style="display:flex; justify-content:space-around; margin-bottom:15px; font-weight:bold; font-size:14px; border-bottom:1px solid #000; padding-bottom:10px;">
                <div>اسم المريض: ${patient.name}</div>
                <div>رقم الطبّلة: ${patient.fileNumber}</div>
                <div>الردهة: ${patient.ward === 'male' ? 'ذكور' : 'إناث'}</div>
            </div>
            <table class="print-table">
                <thead><tr>
                    <th>ت</th><th>اسم المادة</th><th>الكمية المصروفة</th><th>شراء أو كيماديا</th>
                    <th>سعر المفرد</th><th>المجموع</th><th>فروقات إدارية</th><th>الإجمالي</th>
                </tr></thead><tbody>`;

        medsArray.forEach(([name, qty], i) => {
            const dbMed = state.medicationsDB.find(m => m.name === name);
            const price = dbMed ? dbMed.price : 0;
            const source = dbMed ? dbMed.source : "";
            const sub = price * qty;
            html += `<tr>
                <td>${i+1}</td>
                <td style="text-align:right!important; padding-right:8px;">${name}</td>
                <td>${qty}</td><td>${source}</td>
                <td>${price > 0 ? numberFormat(price) + ' د.ع' : ''}</td>
                <td>${sub > 0 ? numberFormat(sub) + ' د.ع' : ''}</td>
                <td style="height: 25px; background: #fff;"></td>
                <td style="height: 25px; background: #fff;"></td>
            </tr>`;
        });

        html += `</tbody></table>
            <div class="print-signatures">
                <div>الصيدلي السريري</div>
                <div>اسم وتوقيع محاسب الجناح الخاص</div>
                <div>اسم وتوقيع مدير الجناح الخاص</div>
            </div>`;

        container.innerHTML = html;
        preview.classList.remove('hidden');
        preview.scrollIntoView({ behavior: 'smooth' });
    }

    function printInvoice() {
        const printArea = document.getElementById('print-area');
        printArea.innerHTML = document.getElementById('invoice-html').innerHTML;
        printArea.classList.remove('hidden');
        window.print();
        setTimeout(() => printArea.classList.add('hidden'), 500);
    }

    // === UTILITIES ===
    function numberFormat(num) {
        return new Intl.NumberFormat('en-US').format(num);
    }

    function setupEventListeners() {
        // Autocomplete Logic
        const medInput = document.getElementById('log-med-search');
        medInput.addEventListener('input', function() {
            const val = this.value.trim();
            if(val.length < 2) return DOM.medDropdown().classList.add('hidden');
            
            const filtered = state.medicationsDB.filter(m => m.name.includes(val)).slice(0, 8);
            if(filtered.length === 0) return DOM.medDropdown().classList.add('hidden');

            DOM.medDropdown().innerHTML = filtered.map(m => 
                `<div class="autocomplete-item" onclick="selectMed('${m.name.replace(/'/g, "\\'")}')">
                    <span>${m.name}</span> <span style="color:var(--muted); font-size:0.7rem; float:left;">${m.source}</span>
                </div>`
            ).join('');
            DOM.medDropdown().classList.remove('hidden');
        });

        document.addEventListener('click', (e) => {
            if(!e.target.closest('#log-med-search') && !e.target.closest('#med-dropdown')) {
                DOM.medDropdown().classList.add('hidden');
            }
        });
    }

    function selectMed(name) {
        document.getElementById('log-med-search').value = name;
        DOM.medDropdown().classList.add('hidden');
        document.getElementById('log-qty').focus();
    }

    // Boot
    document.addEventListener('DOMContentLoaded', initApp);

</script>
</body>
</html>
